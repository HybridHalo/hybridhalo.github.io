{name:'CONTOUR',seed:1337,draw(ctx,W,H,rng){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const field=(x,y)=>Math.sin(x*.016+y*.012+1.4)*.42+Math.sin(-x*.022+y*.028+.9)*.28+Math.sin(x*.008-y*.018+3.1)*.18+Math.sin(x*.038+y*.010+2.4)*.12;
  const s=3,cols=Math.ceil(W/s)+2,rows=Math.ceil(H/s)+2;
  const grid=new Float32Array(cols*rows);
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)grid[r*cols+c]=field(c*s,r*s);
  const NUM=32,allSegs=[];
  for(let l=0;l<NUM;l++){const t=-1+2*l/(NUM-1);const segs=[];
    for(let r=0;r<rows-1;r++)for(let c=0;c<cols-1;c++){
      const v00=grid[r*cols+c],v10=grid[r*cols+c+1],v01=grid[(r+1)*cols+c],v11=grid[(r+1)*cols+c+1];
      const x0=c*s,x1=x0+s,y0=r*s,y1=y0+s;const pts=[];
      if((v00<t)!==(v10<t)){const k=(t-v00)/(v10-v00);pts.push(x0+k*s,y0);}
      if((v10<t)!==(v11<t)){const k=(t-v10)/(v11-v10);pts.push(x1,y0+k*s);}
      if((v01<t)!==(v11<t)){const k=(t-v01)/(v11-v01);pts.push(x0+k*s,y1);}
      if((v00<t)!==(v01<t)){const k=(t-v00)/(v01-v00);pts.push(x0,y0+k*s);}
      if(pts.length>=4)segs.push(pts[0],pts[1],pts[2],pts[3]);
      if(pts.length===8)segs.push(pts[4],pts[5],pts[6],pts[7]);
    }allSegs.push(segs);}
  const render=(col,lw)=>{ctx.strokeStyle=col;ctx.lineWidth=lw;for(const sg of allSegs){ctx.beginPath();for(let i=0;i<sg.length;i+=4){ctx.moveTo(sg[i],sg[i+1]);ctx.lineTo(sg[i+2],sg[i+3]);}ctx.stroke();}};
  render('rgba(255,255,255,0.9)',0.45);
  for(let i=0;i<4;i++){const vx=[rng()*W,rng()*W,rng()*W],vy=[rng()*H,rng()*H,rng()*H];
    ctx.save();ctx.beginPath();ctx.moveTo(vx[0],vy[0]);ctx.lineTo(vx[1],vy[1]);ctx.lineTo(vx[2],vy[2]);ctx.closePath();ctx.clip();
    ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);render('rgba(0,0,0,0.9)',0.45);ctx.restore();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(vx[0],vy[0]);ctx.lineTo(vx[1],vy[1]);ctx.lineTo(vx[2],vy[2]);ctx.closePath();ctx.stroke();}
}},

}},

{name:'FLOW',seed:9001,draw(ctx,W,H,rng){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const af=(x,y)=>(Math.sin(x*.013+y*.009+1.6)+Math.sin(x*.021-y*.017+2.3)*.65+Math.sin(-x*.007+y*.024-.9)*.40)*Math.PI;
  const GS=13,SL=4;
  for(let sy=GS/2;sy<H+GS;sy+=GS)for(let sx=GS/2;sx<W+GS;sx+=GS){

    let x=sx+(rng()-.5)*GS*.4,y=sy+(rng()-.5)*GS*.4;

    ctx.stroke();}
}},

{name:'TILE',seed:3333,draw(ctx,W,H,rng){

  // Seed-driven variation: phase, density, frequency offsets — no transforms

ctx.strokeStyle='rgba(255,255,255,0.84)';ctx.lineWidth=0.48;

  const dS=(cx,cy)=>{const vo=hv(cx,cy,R*.93),vi=hv(cx,cy,R*.4);ctx.beginPath();for(let i=0;i<6;i++){ctx.moveTo(vo[i][0],vo[i][1]);ctx.lineTo(vi[(i+1)%6][0],vi[(i+1)%6][1]);ctx.lineTo(vo[(i+1)%6][0],vo[(i+1)%6][1]);}ctx.stroke();ctx.beginPath();vi.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));ctx.closePath();ctx.stroke();};
  const dSp=(cx,cy)=>{const v=hv(cx,cy,R*.9);ctx.beginPath();v.forEach(([x,y])=>{ctx.moveTo(cx,cy);ctx.lineTo(x,y);});for(let i=0;i<6;i++){ctx.moveTo(v[i][0],v[i][1]);ctx.lineTo(v[(i+2)%6][0],v[(i+2)%6][1]);}ctx.stroke();};
  const dN=(cx,cy)=>{for(let l=4;l>=1;l--){const v=hv(cx,cy,R*l/4.2);ctx.beginPath();v.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));ctx.closePath();ctx.stroke();}};
  const cols=Math.ceil(W/HW)+3,rows=Math.ceil(H/RH)+3;
  for(let row=-1;row<=rows;row++)for(let col=-1;col<=cols;col++){const cx=col*HW+(row%2!==0?HW*.5:0),cy=row*RH;if(cx<-R*2||cx>W+R*2||cy<-R*2||cy>H+R*2)continue;ho(cx,cy);const t=Math.floor(rng()*4);if(t===0)dS(cx,cy);else if(t===1)dSp(cx,cy);else if(t===2)dN(cx,cy);}

}},

{name:'CIRCUIT',seed:6161,draw(ctx,W,H,rng){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const GRID=22,gs=W/GRID,nodes=[],used=new Set();

// ── Build gallery ─────────────────────────────────────────────────────────
const gallery=document.getElementById('gallery');
const canvases=[];
PIECES.forEach(({name,seed,draw},idx)=>{
  const div=document.createElement('div');div.className='piece';
  const canvas=document.createElement('canvas');canvas.width=1200;canvas.height=675;
  const meta=document.createElement('div');meta.className='piece-meta';
  meta.innerHTML=`<span class="pn">${String(idx+1).padStart(3,'0')} : ${name}</span>`;
  div.appendChild(canvas);div.appendChild(meta);gallery.appendChild(div);
  canvases.push({canvas,seed,draw,name});
});

function hashText(str){
  // djb2 hash
  let h=5381;
  for(let i=0;i<str.length;i++) h=((Math.imul(h,33))^str.charCodeAt(i))>>>0;
  return h;
}

function redraw(text){
  const t=String(text);
  const galleryEl=document.getElementById('gallery');
  const scrollTop=galleryEl.scrollTop;
  const btn=document.getElementById('goBtn');
  btn.textContent='...';
  btn.disabled=true;

  // Draw in batches via setTimeout to avoid blocking the UI thread
  const BATCH=8;
  let i=0;
  function drawBatch(){
    const end=Math.min(i+BATCH,canvases.length);
    for(;i<end;i++){
      const{canvas,seed,draw,name}=canvases[i];
      const combined=(hashText(t+'|'+name+'|'+i)^seed)>>>0;
      try{draw(canvas.getContext('2d'),canvas.width,canvas.height,mkRng(combined));}catch(e){console.warn(name,e);}
    }
    // Restore scroll on first batch so the view doesn't jump
    if(i<=BATCH) galleryEl.scrollTop=scrollTop;
    if(i<canvases.length){
      setTimeout(drawBatch,0);
    } else {
      btn.textContent='GO';
      btn.disabled=false;
      galleryEl.scrollTop=scrollTop;
    }
  }
  drawBatch();
}

redraw(document.getElementById('seedInput').value);

document.getElementById('goBtn').onclick=()=>{
  redraw(document.getElementById('seedInput').value);
};
document.getElementById('seedInput').addEventListener('keydown',(e)=>{
  if(e.key==='Enter') redraw(document.getElementById('seedInput').value);
});
