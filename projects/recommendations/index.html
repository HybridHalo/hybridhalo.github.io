<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hybrid Halo - Curated Recommendations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Libre Baskerville', serif;
      background: linear-gradient(to bottom, #1a1a1a 0%, #000000 100%);
      color: #f5f5f0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.02) 2px, rgba(255,255,255,.02) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,.02) 2px, rgba(255,255,255,.02) 4px);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 80px 40px;
      position: relative;
      z-index: 2;
    }

    header {
      text-align: center;
      margin-bottom: 80px;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 400;
      margin-bottom: 16px;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #f5f5f0 0%, #d4a574 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-family: 'Work Sans', sans-serif;
      font-size: 1.1rem;
      color: #b8a891;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .search-container {
      margin-bottom: 48px;
      max-width: 600px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #b8a891;
      width: 20px;
      height: 20px;
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      padding: 18px 20px 18px 56px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 165, 116, 0.2);
      border-radius: 8px;
      color: #f5f5f0;
      font-size: 1rem;
      font-family: 'Work Sans', sans-serif;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    input[type="text"]:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: #d4a574;
    }

    .category-filters {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .category-btn {
      padding: 14px 28px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 165, 116, 0.2);
      border-radius: 6px;
      color: #f5f5f0;
      font-size: 0.95rem;
      font-family: 'Work Sans', sans-serif;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(10px);
    }

    .category-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .category-btn.active {
      background: linear-gradient(135deg, #d4a574 0%, #b8956f 100%);
      border-color: #d4a574;
      color: #1a1a1a;
      font-weight: 600;
    }

    .creator-filter-display {
      margin-bottom: 40px;
      display: none;
    }

    .creator-filter-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: rgba(212, 165, 116, 0.15);
      border: 1px solid rgba(212, 165, 116, 0.3);
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }

    .creator-filter-text {
      font-size: 0.9rem;
      font-family: 'Work Sans', sans-serif;
      color: #d4a574;
      font-weight: 500;
    }

    .clear-creator-btn {
      background: none;
      border: none;
      color: #d4a574;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .clear-creator-btn:hover {
      transform: scale(1.2);
    }

    .tags-section {
      margin-bottom: 60px;
    }

    .tags-header {
      margin-bottom: 20px;
    }

    .tags-header h3 {
      font-size: 0.9rem;
      font-family: 'Work Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #b8a891;
    }

    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tag-btn {
      padding: 8px 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(212, 165, 116, 0.15);
      border-radius: 20px;
      color: #b8a891;
      font-size: 0.85rem;
      font-family: 'Work Sans', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }

    .tag-btn:hover {
      border-color: #d4a574;
      background: rgba(212, 165, 116, 0.15);
      transform: translateY(-2px);
    }

    .tag-btn.active {
      background: rgba(212, 165, 116, 0.2);
      border-color: #d4a574;
      color: #d4a574;
    }

    .medal-tag {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .medal-tag.active {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      border-color: #FFD700;
      color: #1a1a1a;
      font-weight: 600;
    }

    .medal-tag:hover {
      border-color: #FFD700;
      background: rgba(255, 215, 0, 0.15);
    }

    .medal-tag.active:hover {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
    }

    .clear-filters-btn {
      margin-top: 16px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(212, 165, 116, 0.3);
      border-radius: 6px;
      color: #d4a574;
      font-size: 0.85rem;
      font-family: 'Work Sans', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .clear-filters-btn:hover {
      background: rgba(212, 165, 116, 0.1);
    }

    .recommendations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 32px;
      margin-bottom: 80px;
    }

    .recommendation-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(212, 165, 116, 0.15);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .recommendation-card:hover {
      transform: translateY(-8px);
      border-color: rgba(212, 165, 116, 0.4);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    }

    .card-cover {
      height: 220px;
      position: relative;
      overflow: hidden;
      background: #1a1a1a;
    }

    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .card-year {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 6px 14px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 20px;
      font-size: 0.75rem;
      font-family: 'Work Sans', sans-serif;
      color: #fff;
      backdrop-filter: blur(10px);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    .series-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 6px 14px;
      background: rgba(212, 165, 116, 0.9);
      border-radius: 20px;
      font-size: 0.7rem;
      font-family: 'Work Sans', sans-serif;
      color: #1a1a1a;
      backdrop-filter: blur(10px);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .medal-badge {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
      border: 2px solid rgba(255, 255, 255, 0.3);
      z-index: 2;
    }

    .card-content {
      padding: 24px;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 8px;
      line-height: 1.3;
      color: #f5f5f0;
    }

    .card-creator {
      font-size: 1rem;
      font-family: 'Work Sans', sans-serif;
      color: #d4a574;
      margin-bottom: 16px;
      font-weight: 300;
    }

    .card-description {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #c8bda8;
      font-family: 'Work Sans', sans-serif;
      margin-bottom: 20px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .card-tag {
      padding: 4px 12px;
      background: rgba(212, 165, 116, 0.1);
      border: 1px solid rgba(212, 165, 116, 0.2);
      border-radius: 12px;
      font-size: 0.75rem;
      font-family: 'Work Sans', sans-serif;
      color: #9a8875;
      text-transform: lowercase;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: #1a1a1a;
      border: 1px solid rgba(212, 165, 116, 0.3);
      border-radius: 16px;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-close {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(212, 165, 116, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .modal-close:hover {
      transform: rotate(90deg);
      background: rgba(212, 165, 116, 0.2);
      border-color: #d4a574;
    }

    .modal-hero {
      height: 300px;
      position: relative;
      overflow: hidden;
      border-radius: 16px 16px 0 0;
      background: #1a1a1a;
    }

    .modal-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: brightness(0.7);
    }

    .modal-badge {
      position: absolute;
      top: 24px;
      left: 32px;
      padding: 8px 18px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 24px;
      font-size: 0.85rem;
      font-family: 'Work Sans', sans-serif;
      color: #fff;
      backdrop-filter: blur(10px);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
    }

    .modal-medal {
      position: absolute;
      bottom: 24px;
      right: 32px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
      border: 3px solid rgba(255, 255, 255, 0.3);
      z-index: 2;
    }

    .modal-body {
      padding: 48px;
    }

    .modal-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      margin-bottom: 16px;
      line-height: 1.2;
      color: #f5f5f0;
    }

    .modal-creator {
      font-size: 1.5rem;
      font-family: 'Work Sans', sans-serif;
      color: #d4a574;
      margin-bottom: 24px;
      font-weight: 300;
    }

    .modal-description {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #c8bda8;
      font-family: 'Work Sans', sans-serif;
      margin-bottom: 32px;
    }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 48px;
    }

    .modal-tag {
      padding: 8px 18px;
      background: rgba(212, 165, 116, 0.15);
      border: 1px solid rgba(212, 165, 116, 0.3);
      border-radius: 20px;
      font-size: 0.9rem;
      font-family: 'Work Sans', sans-serif;
      color: #d4a574;
      text-transform: lowercase;
    }

    .modal-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 165, 116, 0.3), transparent);
      margin-bottom: 48px;
    }

    .series-section h3 {
      font-size: 1.3rem;
      font-weight: 400;
      margin-bottom: 20px;
      color: #d4a574;
      letter-spacing: 0.03em;
    }

    .series-list {
      list-style: none;
      padding: 0;
      margin: 0 0 48px 0;
    }

    .series-list li {
      font-size: 1rem;
      font-family: 'Work Sans', sans-serif;
      line-height: 2;
      color: #c8bda8;
      padding-left: 28px;
      position: relative;
    }

    .series-list li::before {
      content: attr(data-number);
      position: absolute;
      left: 0;
      color: #d4a574;
      font-weight: 500;
    }

    .recommendation-section h3 {
      font-size: 1.3rem;
      font-weight: 400;
      margin-bottom: 20px;
      color: #d4a574;
      letter-spacing: 0.03em;
    }

    .recommendation-text {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #c8bda8;
      font-family: 'Work Sans', sans-serif;
      margin-bottom: 40px;
    }

    .modal-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      background: linear-gradient(135deg, #d4a574 0%, #b8956f 100%);
      border: none;
      border-radius: 8px;
      color: #1a1a1a;
      font-size: 1rem;
      font-family: 'Work Sans', sans-serif;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .modal-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(212, 165, 116, 0.3);
    }

    .icon {
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header style="animation: fadeIn 1s ease-out">
      <h1>Hybrid Halo</h1>
      <p class="tagline">Curated cultural recommendations worth your time</p>
    </header>

    <!-- Search Bar -->
    <div class="search-container" style="animation: fadeIn 1s ease-out 0.2s both;">
      <svg class="search-icon icon" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input type="text" id="searchInput" placeholder="Search recommendations...">
    </div>

    <!-- Category Filters -->
    <div class="category-filters" id="categoryFilters"></div>

    <!-- Creator Filter Display -->
    <div class="creator-filter-display" id="creatorFilterDisplay">
      <div class="creator-filter-badge">
        <span class="creator-filter-text" id="creatorFilterText"></span>
        <button class="clear-creator-btn" id="clearCreatorFilter">
          <svg class="icon" viewBox="0 0 24 24" style="width: 18px; height: 18px;">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- Tags -->
    <div class="tags-section" id="tagsSection">
      <div class="tags-header">
        <h3>Filter by Tags</h3>
      </div>
      <div class="tags-container" id="tagsContainer"></div>
      <button class="clear-filters-btn" id="clearFiltersBtn" style="display: none;">
        <svg class="icon" viewBox="0 0 24 24" style="width: 16px; height: 16px;">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
        Clear Filters
      </button>
    </div>

    <!-- Recommendations Grid -->
    <div class="recommendations-grid" id="recommendationsGrid"></div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">
        <svg class="icon" viewBox="0 0 24 24" style="width: 20px; height: 20px; color: #d4a574;">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    // Icons
    const icons = {
      book: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>',

    const recommendations = [
      {

        highlyRecommended: true,

        recommendation: 'Le Guin\'s masterpiece transcends science fiction to ask profound questions about gender, identity, and what it means to be human. Set on a frozen planet where inhabitants can change gender, this novel challenged conventions in 1969 and remains startlingly relevant today. The prose is elegant, the world-building impeccable, and the philosophical depth will stay with you long after you finish.'

      {

    // State
    let activeCategory = 'all';
    let selectedTags = [];
    let searchQuery = '';
    let creatorFilter = null;
    let showOnlyMedals = false;

    // Get filtered recommendations
    function getFilteredRecommendations() {
      return recommendations.filter(rec => {
        const matchesCategory = activeCategory === 'all' || rec.type === activeCategory;
        const matchesSearch = searchQuery === '' || 
          rec.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
          rec.creator.toLowerCase().includes(searchQuery.toLowerCase()) ||
          rec.description.toLowerCase().includes(searchQuery.toLowerCase());
        const matchesCreator = !creatorFilter || rec.creator === creatorFilter;
        const matchesMedal = !showOnlyMedals || rec.highlyRecommended;
        
        return matchesCategory && matchesSearch && matchesCreator && matchesMedal;
      });
    }

    // Get available tags from filtered results
    function getAvailableTags() {
      const categoryFiltered = getFilteredRecommendations();
      const tagSet = new Set();
      categoryFiltered.forEach(rec => {
        rec.tags.forEach(tag => tagSet.add(tag));
      });
      return Array.from(tagSet).sort();
    }

    // Final filtered with tags
    function getFinalFiltered() {
      const categoryFiltered = getFilteredRecommendations();
      if (selectedTags.length === 0) return categoryFiltered;
      return categoryFiltered.filter(rec => 
        selectedTags.some(tag => rec.tags.includes(tag))
      );
    }

    // Toggle tag
    function toggleTag(tag) {
      if (selectedTags.includes(tag)) {
        selectedTags = selectedTags.filter(t => t !== tag);
      } else {
        selectedTags.push(tag);
      }
      render();
    }

    // Render category filters
    function renderCategoryFilters() {
      const container = document.getElementById('categoryFilters');
      const categories = [
        { id: 'all', label: 'All', icon: null },
        { id: 'book', label: 'Books', icon: icons.book },
        { id: 'film', label: 'Films', icon: icons.film },
        { id: 'music', label: 'Music', icon: icons.music },
        { id: 'tv', label: 'TV Shows', icon: icons.tv },
        { id: 'videogame', label: 'Video Games', icon: icons.videogame }
      ];

      container.innerHTML = categories.map(cat => `
        <button 
          class="category-btn ${activeCategory === cat.id ? 'active' : ''}" 
          data-category="${cat.id}"
        >
          ${cat.icon ? `<svg class="icon" viewBox="0 0 24 24" style="width: 16px; height: 16px;">${cat.icon}</svg>` : ''}
          ${cat.label}
        </button>
      `).join('');

      container.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategory = btn.dataset.category;
          render();
        });
      });
    }

    // Render creator filter
    function renderCreatorFilter() {
      const display = document.getElementById('creatorFilterDisplay');
      const text = document.getElementById('creatorFilterText');
      
      if (creatorFilter) {
        display.style.display = 'block';
        text.textContent = `Filtering by creator: ${creatorFilter}`;
      } else {
        display.style.display = 'none';
      }
    }

    // Render tags
    function renderTags() {
      const container = document.getElementById('tagsContainer');
      const clearBtn = document.getElementById('clearFiltersBtn');
      const allTags = getAvailableTags();

      let html = `
        <button class="tag-btn medal-tag ${showOnlyMedals ? 'active' : ''}" data-medal="true">
          <svg class="icon" viewBox="0 0 24 24" style="width: 14px; height: 14px;">
            ${icons.medal}
          </svg>
          Highly Recommended
        </button>
      `;

      html += allTags.map(tag => `
        <button 
          class="tag-btn ${selectedTags.includes(tag) ? 'active' : ''}" 
          data-tag="${tag}"
        >
          ${tag}
        </button>
      `).join('');

      container.innerHTML = html;

      // Add event listeners
      container.querySelectorAll('[data-tag]').forEach(btn => {
        btn.addEventListener('click', () => {
          toggleTag(btn.dataset.tag);
        });
      });

      container.querySelector('[data-medal]').addEventListener('click', () => {
        showOnlyMedals = !showOnlyMedals;
        render();
      });

      // Show/hide clear button
      if (selectedTags.length > 0 || showOnlyMedals) {
        clearBtn.style.display = 'flex';
      } else {
        clearBtn.style.display = 'none';
      }
    }

    // Render recommendations
    function renderRecommendations() {
      const container = document.getElementById('recommendationsGrid');
      const filtered = getFinalFiltered();

      container.innerHTML = filtered.map(rec => `
        <div class="recommendation-card" data-id="${rec.id}" style="animation: scaleIn 0.5s ease-out both;">
          <div class="card-cover">
            <img src="${rec.image}" alt="${rec.title}">
            <div class="card-year">${rec.year}</div>
            ${rec.isSeries ? `<div class="series-badge">Series • ${rec.seriesCount} items</div>` : ''}
            ${rec.highlyRecommended ? `
              <div class="medal-badge">
                <svg class="icon" viewBox="0 0 24 24" style="width: 24px; height: 24px; color: #1a1a1a; stroke-width: 2.5;">
                  ${icons.medal}
                </svg>
              </div>
            ` : ''}
          </div>
          <div class="card-content">
            <h3 class="card-title">${rec.title}</h3>
            <p class="card-creator" data-creator="${rec.creator}">${rec.creator}</p>
            <p class="card-description">${rec.description}</p>
            <div class="card-tags">
              ${rec.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}
            </div>
          </div>
        </div>
      `).join('');

      // Add click listeners
      container.querySelectorAll('.recommendation-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.classList.contains('card-creator')) return;
          const id = parseInt(card.dataset.id);
          const rec = recommendations.find(r => r.id === id);
          openModal(rec);
        });
      });

      // Add creator click listeners
      container.querySelectorAll('.card-creator').forEach(creator => {
        creator.addEventListener('click', (e) => {
          e.stopPropagation();
          creatorFilter = creator.dataset.creator;
          render();
        });
        
        creator.addEventListener('mouseenter', (e) => {
          e.target.style.color = '#e6b684';
          e.target.style.textDecoration = 'underline';
          e.target.style.cursor = 'pointer';
        });
        
        creator.addEventListener('mouseleave', (e) => {
          e.target.style.color = '#d4a574';
          e.target.style.textDecoration = 'none';
        });
      });
    }

    // Open modal
    function openModal(rec) {
      const modal = document.getElementById('modal');
      const modalBody = document.getElementById('modalBody');

      modalBody.innerHTML = `
        <div class="modal-hero">
          <img src="${rec.image}" alt="${rec.title}">
          <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(26, 26, 26, 0.95) 100%);"></div>
          <div class="modal-badge">${rec.type} • ${rec.year}</div>
          ${rec.highlyRecommended ? `
            <div class="modal-medal">
              <svg class="icon" viewBox="0 0 24 24" style="width: 32px; height: 32px; color: #1a1a1a; stroke-width: 2.5;">
                ${icons.medal}
              </svg>
            </div>
          ` : ''}
        </div>
        <div class="modal-body">
          <h2 class="modal-title">${rec.title}</h2>
          <p class="modal-creator" data-creator="${rec.creator}">${rec.creator}</p>
          <p class="modal-description">${rec.description}</p>
          <div class="modal-tags">
            ${rec.tags.map(tag => `<span class="modal-tag">${tag}</span>`).join('')}
          </div>
          <div class="modal-divider"></div>
          ${rec.isSeries ? `
            <div class="series-section">
              <h3>Complete Series (${rec.seriesCount} items)</h3>
              <ul class="series-list">
                ${rec.seriesItems.map((item, idx) => `
                  <li data-number="${idx + 1}.">${item}</li>
                `).join('')}
              </ul>
            </div>
            <div class="modal-divider"></div>
          ` : ''}
          <div class="recommendation-section">
            <h3>Why I'd Recommend This</h3>
            <p class="recommendation-text">${rec.recommendation}</p>
          </div>
          <a href="${rec.link}" target="_blank" class="modal-link">
            ${rec.linkLabel}
            <svg class="icon" viewBox="0 0 24 24" style="width: 16px; height: 16px;">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
          </a>
        </div>
      `;

      modal.classList.add('active');
      document.body.style.overflow = 'hidden';

      // Add creator click handler
      const modalCreator = modalBody.querySelector('.modal-creator');
      if (modalCreator) {
        modalCreator.addEventListener('click', () => {
          creatorFilter = modalCreator.dataset.creator;
          closeModal();
          render();
        });
        
        modalCreator.addEventListener('mouseenter', (e) => {
          e.target.style.color = '#e6b684';
          e.target.style.textDecoration = 'underline';
          e.target.style.cursor = 'pointer';
        });
        
        modalCreator.addEventListener('mouseleave', (e) => {
          e.target.style.color = '#d4a574';
          e.target.style.textDecoration = 'none';
        });
      }
    }

    // Close modal
    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }

    // Render everything
    function render() {
      renderCategoryFilters();
      renderCreatorFilter();
      renderTags();
      renderRecommendations();
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      render();
    });

    document.getElementById('clearFiltersBtn').addEventListener('click', () => {
      selectedTags = [];
      showOnlyMedals = false;
      render();
    });

    document.getElementById('clearCreatorFilter').addEventListener('click', () => {
      creatorFilter = null;
      render();
    });

    document.getElementById('modalClose').addEventListener('click', closeModal);

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') {
        closeModal();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    // Initial render
    render();
  </script>
</body>
</html>
